<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <title>eMail</title>
</head>
<body>
    
    <header>
    
        <div class="logo">
            <span class="material-symbols-outlined">
                menu
            </span>    
            <b>e</b>Mail
        </div>

        <button class="btn-search">
            <span class="material-symbols-outlined">
                search
            </span>
        </button>

        <form action="form">
            <input type="text" id="search" class="search" placeholder="Search all conversations">             
        </form>

        <button class="btn-advanced-search">
            <span class="material-symbols-outlined">
                tune
            </span>
        </button>


        <button class="btn-right-side support">
            <span class="material-symbols-outlined">
                help
            </span>            
        </button>

        <button class="btn-right-side settings">
            <span class="material-symbols-outlined">
                settings
            </span>
        </button>

        <button class="btn-right-side account">
            <span class="material-symbols-outlined">
                account_circle
            </span>
        </button>


        
    </header>


    <div class="content">

        <div class="sidebar">

            <button class="btn-compose">
                <span class="material-symbols-outlined">
                    edit
                </span>
                Compose
            </button>

            <div class="h-sidebar">
                Favorites
            </div>

            <button class="line">
                <span class="material-symbols-outlined">
                    inbox
                </span>
                Inbox
            </button>


            <button class="line">
                <span class="material-symbols-outlined">
                    send
                </span>
                Sent
            </button>


            <br><br><br><br>

            <div class="h-sidebar">
                All
            </div>

            <button class="line inbox">

                <span class="material-symbols-outlined">
                    inbox
                </span>
                Inbox
            </button>            

            <button class="line">
                <span class="material-symbols-outlined">
                    send
                </span>
                Sent
            </button>


            <button class="line">
                <span class="material-symbols-outlined">
                    draft
                </span>
                Drafts
            </button>

            <button class="line">
                <span class="material-symbols-outlined">
                    schedule
                </span>
                Snoozed <br>
            </button>

            <button class="line">
                <span class="material-symbols-outlined">
                    schedule_send
                </span>            
                Scheduled
            </button>

        </div>



        <div class="container">


        </div>

        <div class="right-side-content">

            <div class="javascript-control">

                <div class="top">
                    <b>JavaScript</b>
                    <b> × </b>
                </div>


                <button class="btn-remove btn-control">
                    <span class="material-symbols-outlined">
                        remove
                    </span>     
                    Delete an email &nbsp&nbsp&nbsp
                </button>

                <button class="btn-add btn-control">
                    <span class="material-symbols-outlined">
                        add
                    </span>     
                    Add an email &nbsp&nbsp&nbsp
                </button>

            </div>
            
            
            <div class="compose-container">

                <div class="top">
                    <b>New Message</b>
                    <b> × </b>
                </div>
                
                <div class="to">
                    <input type="text" placeholder="To">
                </div>

                <div class="subject">
                    <input type="text" placeholder="Subject">
                </div>

                <div class="message-input">
                    <input type="text" placeholder=".  .  .  .  .  .">
                </div>


                <div class="message-buttons">

                    <button class="send">
                        Send
                    </button>

                    <button class="trash">
                        <span class="material-symbols-outlined">
                            delete
                        </span>
                    </button>

                </div>

            </div>

        </div>


    </div>



    <script src="script.js"></script>
</body>
</html>
