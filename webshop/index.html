<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta nme="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebShop</title>
    <link rel="stylesheet" href="styles.css">
</head>


<body>

    <a name="top"></a>

    <div class="header">
        <img class="header__logo" src="res/logo.png">

        <div class="header__search">
            <input class="header__searchInput" type="text">
            
            <img class="header__searchIcon" src="res/search.svg">
        </div>

        <div class="header__nav">

            <div class="header__option">
                <span class="header__optionLineOne">
                    Hello
                </span>
                <span class="header__optionLineTwo">
                    Sign in
                </span>
            </div>

            <div class="header__option">
                <span class="header__optionLineOne">
                    Returns
                </span>
                <span class="header__optionLineTwo">
                    & Orders
                </span>
            </div>

            <div class="header__option">
                <span class="header__optionLineOne">
                    Your
                </span>
                <span class="header__optionLineTwo">
                    Prime
                </span>
            </div>

            <div class="header__optionBasket">
                <img class="header__optionBasketIcon" src="res/shoppingcart.svg">
                
                <span class="header_optionLineTwo header_basketCount">
                    0
                </span>
            </div>


        </div>

    </div>

    <div class="small__header">
        <div class="small__header__option">
            <b>≡</b> All
        </div>
        <div class="small__header__option">
            Today's deals
        </div>
        <div class="small__header__option">
            Customer service
        </div>
        <div class="small__header__option">
            Registry
        </div>
        <div class="small__header__option">
            Gift Cards
        </div>
        <div class="small__header__option">
            Sell
        </div>
    </div>




    <div class="home">
        
        <div class="home__container">
            <img class="home__image" src="res/banner_small.png">
        
        
            <div class="home__row">
        
                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">Deal of the Day</p>
                    </div>
        
        
        
                    <img src="res/deal.png">
        
                    <button>See all deals</button>
        
                </div>
        
        
                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">Shop by Category</p>
                    </div>
        
        
        
                    <div class="grid">
                        <div class="grid__category">
                            <img class="grid__image" src="res/computer.png">
                            Computers
                        </div>
                        <div class="grid__category">
                            <img class="grid__image" src="res/console.png">
                            Video games
                        </div>
                        <div class="grid__category">
                            <img class="grid__image" src="res/toothbrush.png">
                            Hygiene
                        </div>
                        <div class="grid__category">
                            <img class="grid__image" src="res/book.png">
                            Books
                        </div>
        
                    </div>

        
                    <button>Shop now</button>
        
                </div>
        
                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">International Shopping</p>
                    </div>
        
        
        
                    <img src="res/shipping.png">
        
                    <button>Learn more</button>
        
                </div>
        
            </div>
        
        
        
            <div class="home__row">
        
                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">Electronics</p>
                    </div>
        
        
        
                    <img src="res/electronics.png">
        
                    <button>Shop now</button>
        
                </div>
        
                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">Beauty picks</p>
                    </div>
        
        
        
                    <img src="res/beauty.png">
        
                    <button>Shop now</button>
        
                </div>

                <div class="product">
        
                    <div class="product__info">
                        <p class="product__heading">Health & Personal Care</p>
                    </div>
        
                    <img src="res/health.png">
        
                    <button>Shop now</button>
        
                </div>
        
        
        
            </div>
        
        
        </div>

    </div>


    <div class="back">
        <a class="back__button" href="#top">Back to top</a>
    </div>

    <div class="footer">

    </div>



</body>


</html>
